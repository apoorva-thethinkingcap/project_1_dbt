version: 2

models:
  - name: bronze_date #  Must match the filename of a model -- including case sensitivity.
    config:
      materialized: view
      schema: bronze    #   Takes precedence over the schemas defined in dbt_project.yml

  - name: bronze_product #  Must match the filename of a model -- including case sensitivity.
    config:
      materialized: view
  
  - name: bronze_sales
    columns:
      - name: sales_id
        data_tests:
          - unique
          - not_null
      - name: gross_amount
        data_tests:
          - generic_non_negative
      - name: net_amount
        data_tests:
          - generic_non_negative

  - name: bronze_store
    columns:
      - name: store_sk
        data_tests:
          - unique
          - not_null

      - name: store_name
        data_tests:
          - accepted_values: 
              arguments:
                values: ['MegaMart Manhattan', 'MegaMart Brooklyn', 'MegaMart San Jose', 'MegaMart Toronto', 'MegaMart Austin']
              config:
                severity: warn
      - name: country
        data_tests:
          - accepted_values:
              arguments:
                values: ['USA', 'Canada']