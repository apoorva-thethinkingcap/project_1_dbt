snapshots:
  - name: gold_items
    relation: ref('source_gold_items')
    config:
      schema: gold
      database: "{{ 'gcp-dbt-project-503007' if target.type == 'bigquery' else target.catalog }}"
      unique_key: id
      strategy: timestamp
      updated_at: updateDate
      dbt_valid_to_current: "{{ \"timestamp('9999-12-31')\" if target.type == 'bigquery' else \"to_date('9999-12-31')\" }}"